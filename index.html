<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI聊天助手</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
        body{max-width:800px;margin:20px auto;padding:0 15px}
        #chat{height:600px;border:1px #ddd solid;padding:15px;overflow-y:auto;margin-bottom:15px;border-radius:8px}
        .msg{margin:8px 0;padding:10px;border-radius:6px;max-width:85%}
        .user{background:#e8f4ff;margin-left:auto}
        .ai{background:#f5f5f5;margin-right:auto}
        .box{display:flex;gap:10px}
        #input{flex:1;padding:12px;border:1px #ddd solid;border-radius:6px;outline:none}
        #send{padding:12px 22px;background:#2563eb;color:#fff;border:none;border-radius:6px;cursor:pointer}
    </style>
</head>
<body>
<div id="chat"></div>
<div class="box">
    <input id="input" placeholder="输入问题，回车/点发送">
    <button id="send">发送</button>
</div>

<script>
// ==========【只改这里！填入你的OpenAI sk密钥】==========
const OPENAI_KEY = "REPLACE_YOUR_KEY_AFTER_DEPLOY";
const API_URL = "https://api.openai.com/v1/chat/completions";
const chatDom = document.getElementById("chat");
const inputDom = document.getElementById("input");
const sendBtn = document.getElementById("send");

// 渲染消息
function addMsg(text,isUser){
    const div = document.createElement("div");
    div.className = `msg ${isUser?'user':'ai'}`;
    div.innerText = text;
    chatDom.appendChild(div);
    chatDom.scrollTop = chatDom.scrollHeight;
}

// 请求GPT
async function askGPT(question){
    addMsg(question,true);
    addMsg("AI思考中...",false);
    try{
        const res = await fetch(API_URL,{
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Authorization":`Bearer ${OPENAI_KEY}`
            },
            body:JSON.stringify({
                model:"gpt-3.5-turbo",
                messages:[{role:"user",content:question}],
                temperature:0.7
            })
        })
        const data = await res.json();
        chatDom.lastChild.remove(); // 删除等待文字
        addMsg(data.choices[0].message.content,false);
    }catch(err){
        chatDom.lastChild.innerText = "调用失败：密钥错误/额度不足/网络异常";
        console.error(err)
    }
}

// 绑定按钮和回车
sendBtn.onclick = ()=>{
    const val = inputDom.value.trim();
    if(!val)return;
    inputDom.value = "";
    askGPT(val);
}
inputDom.onkeydown = e=>{
    if(e.key==="Enter")sendBtn.click();
}
</script>
</body>
</html>
