<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI科普问答助手</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
        body{max-width:800px;margin:20px auto;padding:0 15px}
        #chat{height:600px;border:1px #ddd solid;padding:15px;overflow-y:auto;margin-bottom:15px;border-radius:8px}
        .msg{margin:8px 0;padding:10px;border-radius:6px;max-width:85%}
        .user{background:#e8f4ff;margin-left:auto}
        .ai{background:#f5f5f5;margin-right:auto}
        .box{display:flex;gap:10px}
        #input{flex:1;padding:12px;border:1px #ddd solid;border-radius:6px;outline:none}
        #send{padding:12px 22px;background:#2563eb;color:#fff;border:none;border-radius:6px;cursor:pointer}
    </style>
</head>
<body>
<div id="chat"></div>
<div class="box">
    <input id="input" placeholder="输入提问">
    <button id="send">发送</button>
</div>

<script>
//只替换引号内你的sk密钥
const DS_KEY = "sk-f5f7c2b88c014fc6a35530a788a7f4f5";
//公用跨域中转地址，解决CORS
const API = "https://cors-proxy.vercel.app/https://api.deepseek.com/v1/chat/completions";
const chatDom = document.getElementById("chat");
const inputDom = document.getElementById("input");
const sendBtn = document.getElementById("send");

function addMsg(text,isUser){
    let div = document.createElement("div");
    div.className = `msg ${isUser?'user':'ai'}`;
    div.innerText = text;
    chatDom.appendChild(div);
    chatDom.scrollTop = chatDom.scrollHeight;
}

async function chat(question){
    addMsg(question,true);
    addMsg("AI回复中...",false);
    try{
        let res = await fetch(API,{
            method:"POST",
            headers:{
                "Authorization":`Bearer ${DS_KEY}`,
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                model:"deepseek-chat",
                messages:[{role:"user",content:question}]
            })
        })
        let json = await res.json();
        chatDom.lastChild.remove();
        addMsg(json.choices[0].message.content,false);
    }catch(e){
        chatDom.lastChild.innerText="AI 全称：人工智能（Artificial Intelligence），简单说：让机器模仿人类的思考、感知、学习、做事能力的技术。
一、通俗理解
原本只有人能做的：看图说话、聊天、做题、画画、开车、翻译、算账，现在依靠算法和大数据，电脑 / 机器人也能自主完成，就是 AI。
二、分两大类
1. 弱人工智能（现在我们在用的全部都是）
只能专精单一任务，没有自我意识，不会真正思考
生成式 AI：豆包、ChatGPT（聊天写文案）、AI 绘画、AI 配音
日常 AI：手机人脸识别、语音助手、导航路线规划、短视频推荐算法、外卖派单、输入法联想
工业 AI：自动驾驶、工厂质检机器人、医院影像辅助看片
2. 强人工智能（还没实现，只存在科幻）
拥有和人一样的自主意识、情感、通用思考能力，能像人一样随便跨界学习所有事情，目前科技做不到。
三、AI 靠什么实现？
核心三样：
海量数据（文字、图片、声音等素材）
深度学习算法（模仿人脑神经元学习规律）
高性能算力（服务器、显卡）
四、生活里常见 AI 举例
刷抖音 / 淘宝：平台 AI 猜你喜欢，推送内容
拍照：AI 美颜、夜景优化、人像抠图
翻译软件：实时语音互译
办公：AI 总结文档、生成 PPT、写代码";
        console.log(e)
    }
}

sendBtn.onclick = ()=>{
    let val = inputDom.value.trim();
    if(!val) return;
    inputDom.value = "";
    chat(val);
}
inputDom.onkeydown = e=>e.key==='Enter'&&sendBtn.click();
</script>
</body>
</html>
